name: Build and Deploy
on:
  push:
    branches: [ main ]
permissions:
  contents: read
jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: production
          push: true
          no-cache: true
          sbom: true
          provenance: mode=max
          tags: ghcr.io/mcnamara84/omxfc-vereinswebseite:latest

      - name: Scan pushed image for high and critical vulnerabilities
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b # v1.23.1
        with:
          command: cves
          image: registry://ghcr.io/mcnamara84/omxfc-vereinswebseite@${{ steps.build-and-push.outputs.digest }}
          only-severities: critical,high
          exit-code: true
          summary: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /root/maddrax-fanclub

            COMPOSE="docker compose --env-file .env.production"
            
            echo "Pulling new images..."
            $COMPOSE pull
            
            echo "Removing old containers..."
            $COMPOSE down --remove-orphans
            
            echo "Removing app_data volume to ensure fresh assets..."
            docker volume rm maddrax-fanclub_app_data || true
            
            echo "Starting infrastructure containers..."
            $COMPOSE up -d --force-recreate db typesense

            echo "Starting application container to initialize shared app volume..."
            $COMPOSE up -d --force-recreate --no-deps app

            echo "Starting web container..."
            $COMPOSE up -d --force-recreate --no-deps nginx
            
            echo "Waiting for containers to start..."
            sleep 15
            
            echo "Checking container status:"
            docker ps -a
            
            echo "Waiting for database to be ready (MariaDB upgrade may take a few minutes)..."
            DB_READY=0
            for i in {1..60}; do
              if docker exec maddrax-db sh -lc 'mariadb-admin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent' >/dev/null 2>&1; then
                echo "Database is ready!"
                docker exec maddrax-db sh -lc 'mariadb -u root -p"$MYSQL_ROOT_PASSWORD" -e "SELECT VERSION();"'
                DB_READY=1
                break
              fi
              echo "Waiting for database... ($i/60)"
              sleep 5
            done

            if [ "$DB_READY" != "1" ]; then
              echo "Database did not become ready in time. Last database logs:"
              docker logs maddrax-db
              exit 1
            fi
            
            echo "Running Laravel setup commands..."
            
            # CRITICAL: Clear ALL caches FIRST - do this BEFORE any file operations
            echo "Clearing all caches BEFORE running any Laravel commands..."
            echo "Removing Laravel bootstrap cache files..."
            docker exec maddrax-app sh -lc 'rm -f /var/www/html/bootstrap/cache/*.php' || true
            docker exec maddrax-app sh -lc 'rm -rf /var/www/html/storage/framework/cache/*' || true
            docker exec maddrax-app sh -lc 'rm -rf /var/www/html/storage/framework/views/*' || true
            docker exec maddrax-app sh -lc 'rm -rf /var/www/html/storage/framework/sessions/*' || true
            
            # Verify caches are gone
            echo "Verifying caches are removed..."
            docker exec maddrax-app ls -la /var/www/html/bootstrap/cache/ || true
            
            # Erstelle den Storage-Link
            docker exec maddrax-app php artisan storage:link || true
            
            # Führe Migrationen aus
            if docker exec maddrax-app php artisan migrate --force; then
              echo "Migrations completed successfully"
            else
              echo "Migration failed, checking logs..."
              docker logs maddrax-app
              exit 1
            fi
            
            # Cache-Management - REBUILD caches after migrations
            echo "Rebuilding caches..."
            docker exec maddrax-app php artisan config:cache
            docker exec maddrax-app php artisan route:cache
            docker exec maddrax-app php artisan view:cache
            
            # Kompendium-Index wiederherstellen falls nötig
            echo "Checking Kompendium search index..."
            docker exec maddrax-app php artisan kompendium:rebuild-index
            
            # Berechtigungen setzen
            echo "Setting permissions..."
            docker exec maddrax-app chown -R www-data:www-data /var/www/html/storage
            docker exec maddrax-app chmod -R 775 /var/www/html/storage
            
            # Start long-running workers only after migrations and the
            # configuration cache have been rebuilt. Otherwise they can retain
            # stale environment values for the lifetime of the process.
            echo "Starting background service containers..."
            $COMPOSE up -d --force-recreate --no-deps queue scheduler
            sleep 5

            # Gesundheitschecks
            echo "Running health checks..."
            
            echo "=== Container Status ==="
            docker ps

            echo "=== Verifying background services ==="
            for service in queue scheduler; do
              if [ "$($COMPOSE ps --status running --services "$service")" = "$service" ]; then
                echo "✅ ${service}: RUNNING"
              else
                echo "❌ ${service}: NOT RUNNING"
                echo "=== ${service} logs ==="
                $COMPOSE logs --tail=50 "$service" || true
                exit 1
              fi
            done
            
            echo "=== Testing connectivity ==="
            if curl -f http://localhost:8080 >/dev/null 2>&1; then
              echo "✅ Local connectivity test: PASSED"
            else
              echo "❌ Local connectivity test: FAILED"
              echo "Container logs for debugging:"
              echo "=== Nginx logs ==="
              docker logs --tail=20 maddrax-nginx
              echo "=== App logs ==="
              docker logs --tail=20 maddrax-app
              exit 1
            fi
            
            echo "=== Verifying Livewire assets ==="
            if docker exec maddrax-app test -f /var/www/html/public/vendor/livewire/livewire.js; then
              echo "✅ Livewire assets: FOUND"
            else
              echo "❌ Livewire assets: MISSING"
              echo "Re-publishing Livewire assets..."
              docker exec maddrax-app php artisan vendor:publish --tag=livewire:assets --force
            fi
            
            echo "🚀 Deployment completed successfully!"