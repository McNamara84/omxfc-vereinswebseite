name: PHP Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    name: PHP 8.5 Tests (fast)
    env:
      APP_KEY: ${{ secrets.APP_KEY }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
          extensions: gd, exif
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache Composer downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.5-composer-cache-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache PHPUnit result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .phpunit.cache
          key: ${{ runner.os }}-php-8.5-phpunit-cache-${{ hashFiles('phpunit.xml', 'composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-phpunit-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Setup Node.js and build assets
        uses: ./.github/actions/build-assets
      - name: Execute tests (Unit and Feature tests) excluding #[Large]
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php vendor/bin/phpunit --exclude-group large

  maddraxikon_mariadb:
    runs-on: ubuntu-latest
    name: PHP 8.5 Maddraxikon (MariaDB 12.3)
    services:
      mariadb:
        image: mariadb:12.3@sha256:628f228f0fd5913a220438693576b29b6fe4dc1fa0a1298c0e98579fae28635f
        env:
          MARIADB_DATABASE: omxfc_maddraxikon_test
          MARIADB_USER: omxfc_test
          MARIADB_PASSWORD: omxfc_test_password
          MARIADB_ROOT_PASSWORD: omxfc_root_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -u root
          -pomxfc_root_test_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: omxfc_maddraxikon_test
      DB_USERNAME: omxfc_test
      DB_PASSWORD: omxfc_test_password

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
          extensions: pdo_mysql
      - name: Generate ephemeral application key
        run: php -r "file_put_contents(getenv('GITHUB_ENV'), 'APP_KEY=base64:'.base64_encode(random_bytes(32)).PHP_EOL, FILE_APPEND);"
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-mariadb-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-mariadb-composer-
            ${{ runner.os }}-php-8.5-composer-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Setup Node.js and build assets
        uses: ./.github/actions/build-assets
      - name: Verify fresh MariaDB migrations
        run: php artisan migrate:fresh --force
      - name: Execute Maddraxikon tests on MariaDB
        run: php vendor/bin/phpunit --configuration=phpunit.mariadb.xml

  tests_large:
    runs-on: ubuntu-latest
    name: PHP 8.5 Tests (large)
    env:
      APP_KEY: ${{ secrets.APP_KEY }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache Composer downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.5-composer-cache-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache PHPUnit result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .phpunit.cache
          key: ${{ runner.os }}-php-8.5-phpunit-cache-${{ hashFiles('phpunit.xml', 'composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-phpunit-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Setup Node.js and build assets
        uses: ./.github/actions/build-assets
      - name: Execute only #[Large] tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php vendor/bin/phpunit --group large

  browser_preview:
    runs-on: ubuntu-latest
    name: PHP 8.5 Browser Preview Regression
    env:
      APP_KEY: ${{ secrets.APP_KEY }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache Composer downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.5-composer-cache-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Setup Node.js and build assets
        uses: ./.github/actions/build-assets
      - name: Install Playwright browser dependencies
        run: npx playwright install-deps chromium
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Execute Pest browser preview regression
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        # Keep the Pest/PHPUnit order explicit and reproducible for this browser regression.
        run: ./vendor/bin/pest tests/Browser/ModalBackdropPreviewTest.php --order-by=random --random-order-seed=1

  coverage:
    needs:
      - tests
      - tests_large
    runs-on: ubuntu-latest
    name: PHP 8.5 - Coverage
    env:
      APP_KEY: ${{ secrets.APP_KEY }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Dieser Job startet oft deutlich spaeter als die PR-Testjobs.
          # Der persistente Head-SHA vermeidet fragile Fetches auf einen veralteten Merge-Ref.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.5'
          extensions: gd, exif
          coverage: xdebug
          ini-values: xdebug.mode=coverage
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache Composer downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-php-8.5-composer-cache-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Cache PHPUnit result cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .phpunit.cache
          key: ${{ runner.os }}-php-8.5-phpunit-cache-${{ hashFiles('phpunit.xml', 'composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-phpunit-cache-
            ${{ runner.os }}-php-8.5-
            ${{ runner.os }}-
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Setup Node.js and build assets
        uses: ./.github/actions/build-assets
      - name: Execute tests with coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          XDEBUG_MODE: coverage
        run: php artisan test tests/Feature --coverage-clover=coverage.xml
      - name: Create PHP coverage badge
        if: github.ref == 'refs/heads/main'
        uses: timkrase/phpunit-coverage-badge@b2cec23f5564ebf1030a6aa5b1e0fcadc5674d79 # v1.2.1
        with:
          report: coverage.xml
          coverage_badge_path: output/php-coverage.svg
          push_badge: false
      - name: Customize PHP coverage badge label
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p badge-output
          if [ -f output/php-coverage.svg ]; then
            cp output/php-coverage.svg badge-output/php-coverage.svg
            sed -i 's/Coverage/PHP Coverage/' badge-output/php-coverage.svg
          fi
      - name: Upload PHP coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: php-coverage-report
          path: coverage.xml
      - name: Upload PHP coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: php-coverage-badge
          path: badge-output/php-coverage.svg
          if-no-files-found: ignore

  js-coverage:
    needs:
      - tests
      - tests_large
    runs-on: ubuntu-latest
    name: JS Coverage

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Dieser Job startet oft deutlich spaeter als die PR-Testjobs.
          # Der persistente Head-SHA vermeidet fragile Fetches auf einen veralteten Merge-Ref.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.node-version'
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Run Vitest tests with coverage
        run: npm run test:coverage
      - name: Create JS coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p output
          if [ -f "coverage/coverage-summary.json" ]; then
            npx --yes make-coverage-badge --report-path=coverage/coverage-summary.json --output-path=output/js-coverage.svg
            sed -i 's/Coverage/JS Coverage/' output/js-coverage.svg
          fi
      - name: Upload JS coverage summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: js-coverage-summary
          path: coverage/coverage-summary.json
      - name: Upload JS coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: js-coverage-badge
          path: output/js-coverage.svg
          if-no-files-found: ignore

  deploy-coverage:
    permissions:
      contents: write
    needs:
      - coverage
      - js-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Determine deployment target
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Coverage artifacts will be deployed to the image-data branch."
          else
            echo "Deployment skipped: coverage artifacts are only published for push events on the main branch."
          fi
      - name: Download PHP coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: php-coverage-badge
          path: artifacts/php/badge
      - name: Download JS coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-coverage-badge
          path: artifacts/js/badge
      - name: Download JS coverage summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: js-coverage-summary
          path: artifacts/js/summary
      - name: Download PHP coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: php-coverage-report
          path: artifacts/php/report
      - name: Prepare deployment directory
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p output

          if [ -d artifacts/js/badge ]; then
            js_badge=$(find artifacts/js/badge -name 'js-coverage.svg' -print -quit)
            if [ -n "$js_badge" ]; then
              cp "$js_badge" output/js-coverage.svg
            fi
          fi

          if [ -d artifacts/php/badge ]; then
            php_badge=$(find artifacts/php/badge -name 'php-coverage.svg' -print -quit)
            if [ -n "$php_badge" ]; then
              cp "$php_badge" output/php-coverage.svg
            fi
          fi

          if [ -d artifacts/js/summary ]; then
            js_summary=$(find artifacts/js/summary -name 'coverage-summary.json' -print -quit)
            if [ -n "$js_summary" ]; then
              mkdir -p output/coverage
              cp "$js_summary" output/coverage/coverage-summary.json
            fi
          fi

          if [ -d artifacts/php/report ]; then
            php_report=$(find artifacts/php/report -name 'coverage.xml' -print -quit)
            if [ -n "$php_report" ]; then
              cp "$php_report" output/coverage.xml
            fi
          fi
      - name: Deploy coverage artifacts to image-data branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          publish_dir: ./output
          publish_branch: image-data
          github_token: ${{ secrets.GITHUB_TOKEN }}

