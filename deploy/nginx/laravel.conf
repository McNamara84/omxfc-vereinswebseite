# HTTPS-Erkennung: "on" nur wenn Schema tatsächlich HTTPS ist, sonst leer.
# Symfony/Laravel behandelt jeden nicht-leeren HTTPS-Wert (außer "off") als secure.
map $scheme $fcgi_https {
    https   "on";
    default "";
}

server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 110M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # WICHTIG: Livewire-Routen MÜSSEN an Laravel weitergeleitet werden
    location ~ ^/livewire/ {
        try_files $uri /index.php?$query_string;
    }

    # Statische Assets direkt servieren
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Build Assets (Vite) - AUSSER Livewire
    location ~ ^/build/.*\.(css|js|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Images
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon directory
    location /favicon/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vendor Assets (außer Livewire-Routen)
    location ~ ^/vendor/(?!livewire/) {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel routes (inkl. Livewire)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Handler
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # HTTPS-Erkennung: "on" bei HTTPS, leer bei HTTP
        fastcgi_param HTTPS $fcgi_https if_not_empty;
        # Proxy-Header: Nginx ist der Edge-Proxy, daher eigene Werte setzen
        # (keine Client-gelieferten Header propagieren → verhindert Spoofing).
        # Falls ein vorgelagerter LB/Proxy existiert, set_real_ip_from + real_ip_header konfigurieren.
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_read_timeout 300;
    }

    # Security: Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}