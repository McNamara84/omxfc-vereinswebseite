# HTTPS-Erkennung: "on" nur wenn Schema tatsächlich HTTPS ist, sonst leer.
# Symfony/Laravel behandelt jeden nicht-leeren HTTPS-Wert (außer "off") als secure.
map $scheme $fcgi_https {
    https   "on";
    default "";
}

server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 110M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # HTTPS-Erkennung: "on" bei HTTPS, leer bei HTTP
        fastcgi_param HTTPS $fcgi_https if_not_empty;
        # Proxy-Header: Nginx ist der Edge-Proxy, daher eigene Werte setzen
        # (keine Client-gelieferten Header propagieren → verhindert Spoofing).
        # Falls ein vorgelagerter LB/Proxy existiert, set_real_ip_from + real_ip_header konfigurieren.
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Build-Assets (Vite)
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Statische Dateien
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}