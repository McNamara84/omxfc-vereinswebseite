# Eingehende X-Forwarded-* Header propagieren, Fallback auf eigene Werte
# wenn kein vorgelagerter Load-Balancer/Proxy existiert.
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_host $fwd_host {
    default $http_x_forwarded_host;
    ""      $host;
}

map $http_x_forwarded_port $fwd_port {
    default $http_x_forwarded_port;
    ""      $server_port;
}

server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 110M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # HTTPS-Erkennung via Proxy-Header
        fastcgi_param HTTPS $fwd_proto;
        # Client-IP und Proxy-Header an PHP-FPM durchreichen
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $fwd_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $fwd_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $fwd_port;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Build-Assets (Vite)
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Statische Dateien
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}